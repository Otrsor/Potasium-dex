<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Banerica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #f5c842;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            color: #f5c842;
            text-shadow: 3px 3px 0 #c92a2a;
            letter-spacing: 3px;
        }

        .header p {
            color: #aaa;
            font-size: 1.1em;
            margin-top: 5px;
        }

        /* Search bar - Filters */
        .search-section {
            background: #0f3460;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: none;
            background: #1a1a3e;
            color: white;
            font-size: 1em;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .search-box .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        .filter-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a2a5e;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: 0.2s;
        }

        .filter-group label:hover {
            background: #2a4a7e;
            transform: scale(1.05);
        }

        .filter-group label input[type="checkbox"] {
            accent-color: #f5c842;
        }

        .bst-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2a5e;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .bst-filter input[type="range"] {
            width: 120px;
            accent-color: #f5c842;
        }

        .bst-filter span {
            font-weight: bold;
            color: #f5c842;
            min-width: 40px;
        }

        /* POKEMON GRID */
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* TARJETA DE POKEMON */
        .pokemon-card {
            background: linear-gradient(145deg, #1a2a5e, #0f1a3e);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: #f5c842;
            box-shadow: 0 10px 30px rgba(245, 200, 66, 0.2);
        }

        .pokemon-card .id {
            font-size: 0.8em;
            color: #888;
            position: absolute;
            top: 10px;
            left: 12px;
            font-weight: bold;
        }

        .pokemon-card .nombre {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0 5px;
            color: #fff;
        }

        .pokemon-card .types {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-badge.grass { background: #27ae60; color: white; }
        .type-badge.fire { background: #e67e22; color: white; }
        .type-badge.water { background: #2980b9; color: white; }
        .type-badge.electric { background: #f1c40f; color: #222; }
        .type-badge.psychic { background: #8e44ad; color: white; }
        .type-badge.ice { background: #5dade2; color: #222; }
        .type-badge.dragon { background: #1a5276; color: white; }
        .type-badge.dark { background: #2c3e50; color: white; }
        .type-badge.fairy { background: #e84393; color: white; }
        .type-badge.fighting { background: #c0392b; color: white; }
        .type-badge.flying { background: #85c1e9; color: #222; }
        .type-badge.poison { background: #6c3483; color: white; }
        .type-badge.ground { background: #a67c52; color: white; }
        .type-badge.rock { background: #7f8c8d; color: white; }
        .type-badge.bug { background: #2ecc71; color: #222; }
        .type-badge.ghost { background: #4a235a; color: white; }
        .type-badge.steel { background: #7f8c8d; color: white; }
        .type-badge.normal { background: #95a5a6; color: #222; }

        .pokemon-card .bst {
            font-size: 0.9em;
            color: #f5c842;
            margin: 5px 0;
        }

        .bst-bar {
            height: 4px;
            background: #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 20px;
        }

        .bst-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #f5c842, #f39c12);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* PAGINACIÓN */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .pagination button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
        }

        .pagination button:hover {
            background: #1a4f8a;
            transform: scale(1.05);
        }

        .pagination button.active {
            background: #f5c842;
            color: #1a1a2e;
            font-weight: bold;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .pagination .info {
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #aaa;
            font-size: 0.9em;
        }

        /* MODAL - Details */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a2a5e, #0f1a3e);
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            border: 2px solid #f5c842;
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: #c92a2a;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        .modal-close:hover {
            transform: scale(1.1);
            background: #e74c3c;
        }

        .modal .nombre {
            font-size: 2em;
            font-weight: bold;
            color: #f5c842;
            margin: 10px 0 5px;
        }

        .modal .id {
            color: #888;
            font-size: 1em;
        }

        .modal .types {
            display: flex;
            gap: 8px;
            margin: 10px 0 15px;
            flex-wrap: wrap;
        }

        .modal .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 20px;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
        }

        .modal .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal .stat-item .label {
            color: #aaa;
        }

        .modal .stat-item .value {
            font-weight: bold;
            color: #f5c842;
        }

        .modal .bst-total {
            text-align: center;
            font-size: 1.3em;
            color: #f5c842;
            margin: 10px 0;
            padding: 10px;
            background: rgba(245, 200, 66, 0.1);
            border-radius: 10px;
        }

        .modal .section-title {
            color: #f5c842;
            font-size: 1.1em;
            margin: 15px 0 8px;
            border-bottom: 1px solid rgba(245, 200, 66, 0.2);
            padding-bottom: 5px;
        }

        .modal .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .modal .move-tag {
            background: #2c3e50;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #ddd;
        }

        .modal .abilities {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .modal .ability-tag {
            background: #1a4f8a;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #fff;
        }

        .modal .ability-tag.hidden {
            background: #6c3483;
        }

        .modal .pokedex-entry {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-style: italic;
            color: #ccc;
            line-height: 1.5;
        }

        .modal .evolution {
            margin: 10px 0;
            padding: 10px;
            background: rgba(245, 200, 66, 0.1);
            border-radius: 10px;
            text-align: center;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .search-section {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }

            .modal-content {
                padding: 20px;
                margin: 10px;
            }

            .modal .stats-grid {
                grid-template-columns: 1fr;
            }

            .filter-group {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .pokemon-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }

            .pokemon-card .nombre {
                font-size: 1em;
            }
        }

        /* SCROLLBAR */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: #0f1a3e;
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: #f5c842;
            border-radius: 10px;
        }

        /* CONTADOR DE RESULTADOS */
        .results-info {
            text-align: center;
            color: #aaa;
            margin: 10px 0 20px;
            font-size: 0.95em;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.2em;
            grid-column: 1 / -1;
        }

        .no-results span {
            font-size: 3em;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>⚡ POKEDEX</h1>
            <p>Banerica • <span id="totalCount">0</span> Pokemon</p>
        </div>

        <!-- BÚSQUEDA Y FILTROS -->
        <div class="search-section">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name, number, move...">
            </div>
            <div class="filters">
                <div class="filter-group" id="typeFilters">
                    <!-- Generado por JS -->
                </div>
                <div class="bst-filter">
                    <span>BST ≥</span>
                    <input type="range" id="bstSlider" min="0" max="800" value="0">
                    <span id="bstValue">0</span>
                </div>
            </div>
        </div>

        <!-- CONTADOR -->
        <div class="results-info" id="resultsInfo">0 Pokémon</div>

        <!-- GRID DE POKEMON -->
        <div class="pokemon-grid" id="pokemonGrid"></div>

        <!-- PAGINACIÓN -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  🧬  DATOS DE LA POKEDEX (COMPACTOS)
        // ============================================================
      const pokemonData = [
      {id:1,nombre:"Burpider",tipos:["grass"],bst:314,stats:{hp:48,atk:57,def:52,spa:55,spd:57,spe:45},habilidades:["OVERGROW"],hOculta:"CHEESETOUCH",movimientos:["TACKLE","STRINGSHOT","LEAFAGE","BUGBITE","RAZORLEAF","TAKEDOWN","TRAILBLAZE","GROWTH","GRASSKNOT","STICKYWEB","LEAFSTORM"],evolucion:"VEGOIR (Nv.15)",pokedex:"Burpider naturally grow plants on their heads that resemble burgers, which mold on the top. They bury their eggs in soil."},
      {id:2,nombre:"Vegoir",tipos:["grass","fighting"],bst:410,stats:{hp:63,atk:82,def:68,spa:68,spd:70,spe:59},habilidades:["OVERGROW"],hOculta:"CHEESETOUCH",movimientos:["VITALTHROW","TACKLE","STRINGSHOT","LEAFAGE","BUGBITE","STICKYWEB","RAZORLEAF","TAKEDOWN","TRAILBLAZE","SYNTHESIS","GRASSKNOT","BULKUP","COUNTER"],evolucion:"BURBACKER (Nv.35)",pokedex:"Vegoir tend to maintain notably healthy diets. The soft plants covering their backs serve to shield them from falling fruits as they headbutt trees."},
      {id:3,nombre:"Burbacker",tipos:["grass","fighting"],bst:535,stats:{hp:83,atk:120,def:92,spa:85,spd:84,spe:71},habilidades:["OVERGROW"],hOculta:"CHEESETOUCH",movimientos:["STORMTHROW","MACHPUNCH","BUGBITE","TACKLE","STRINGSHOT","LEAFAGE","LEECHSEED","RAZORLEAF","TAKEDOWN","STICKYWEB","TRAILBLAZE","SYNTHESIS","GRASSKNOT","BULKUP","COUNTER","LUNGE"],evolucion:"---",pokedex:"Burbacker tackle each other until one falls to the ground. With their competitive nature, taunts turn into brawls very easily."},
      {id:4,nombre:"Fryre",tipos:["fire"],bst:303,stats:{hp:48,atk:51,def:40,spa:62,spd:57,spe:45},habilidades:["BLAZE"],hOculta:"SALTYUP",movimientos:["POUND","LEER","EMBER","SMOKESCREEN","RAPIDSPIN","FOCUSENERGY","WILLOWISP","FLAMETHROWER","STEALTHROCK","FIREBLAST","INFERNO"],evolucion:"FRONCH (Nv.15)",pokedex:"Fryre is commonly mistaken for a fry, but is too hot to eat. The hot salt they leave behind is often collected for use as an exotic seasoning."},
      {id:5,nombre:"Fronch",tipos:["fire","rock"],bst:405,stats:{hp:61,atk:71,def:56,spa:92,spd:71,spe:54},habilidades:["BLAZE"],hOculta:"SALTYUP",movimientos:["ROCKTHROW","POUND","LEER","EMBER","SMOKESCREEN","RAPIDSPIN","FOCUSENERGY","WILLOWISP","FLAMETHROWER","STEALTHROCK","FIREBLAST","INFERNO"],evolucion:"FRYBROS (Nv.35)",pokedex:"Fronch can spin at over 2900 RPM, often causing a blazing spiral to surround them. While spinning, they launch salt aimlessly."},
      {id:6,nombre:"Frybros",tipos:["fire","rock"],bst:532,stats:{hp:71,atk:110,def:70,spa:101,spd:109,spe:71},habilidades:["BLAZE"],hOculta:"SALTYUP",movimientos:["ROCKBLAST","ROCKTHROW","POUND","LEER","EMBER","SMOKESCREEN","RAPIDSPIN","SLAM","FOCUSENERGY","WILLOWISP","FLAMETHROWER","STEALTHROCK","FIREBLAST","INFERNO","ROCKSLIDE"],evolucion:"---",pokedex:"Each head has its own moral stance, and they tend to bicker daily. A Frybros' mortars launch chunks of salt powerful enough to tear through metal."},
      {id:7,nombre:"Whipsplash",tipos:["water"],bst:311,stats:{hp:48,atk:47,def:56,spa:45,spd:59,spe:56},habilidades:["TORRENT"],hOculta:"STATIC",movimientos:["TACKLE","LEER","BUBBLE","ASTONISH","BUBBLEBEAM","FOCUSENERGY","STOMP","REFLECT","WHIRLPOOL","MIST","HYDROPUMP"],evolucion:"SPLACUP (Nv.15)",pokedex:"Whipsplash treads carefully as to not spill water from its cup. While the water often refills itself quickly, it might not recover if dried out."},
      {id:8,nombre:"Splacup",tipos:["water","fairy"],bst:407,stats:{hp:65,atk:60,def:79,spa:54,spd:81,spe:68},habilidades:["TORRENT"],hOculta:"STATIC",movimientos:["FAIRYWIND","TACKLE","LEER","BUBBLE","ASTONISH","BUBBLEBEAM","FOCUSENERGY","STOMP","REFLECT","WHIRLPOOL","MIST","HYDROPUMP"],evolucion:"SPRITSPLASH (Nv.35)",pokedex:"Splacup's body produces a sickeningly sweet liquid. It uses this fizzy liquid as a means of both restoring its energy and warding off predators."},
      {id:9,nombre:"Spritsplash",tipos:["water","fairy"],bst:533,stats:{hp:76,atk:85,def:122,spa:56,spd:113,spe:81},habilidades:["TORRENT"],hOculta:"STATIC",movimientos:["DISARMINGVOICE","FAIRYWIND","TACKLE","LEER","BUBBLE","ASTONISH","FOCUSENERGY","BUBBLEBEAM","STOMP","REFLECT","WHIRLPOOL","MIST","HYDROPUMP","MOONBLAST"],evolucion:"---",pokedex:"Spritsplash are often seen refreshing other Pokemon during droughts. The water in their bodies is infused with the elements around them."},
      {id:10,nombre:"Bugerpunch",tipos:["bug","dark"],bst:178,stats:{hp:35,atk:33,def:20,spa:40,spd:20,spe:30},habilidades:["SHIELDDUST"],hOculta:"PICKPOCKET",movimientos:["TACKLE","STRINGSHOT","SUCKERPUNCH","BUGBITE"],evolucion:"PICCOON (Nv.8)",pokedex:"Bugerpunch will form alliances with each other, and ambush other colonies of Bugerpunch. They are constantly at war over territory."},
      {id:11,nombre:"Piccoon",tipos:["bug","dark"],bst:250,stats:{hp:46,atk:55,def:49,spa:17,spd:15,spe:28},habilidades:["SHIELDDUST"],hOculta:"PICKPOCKET",movimientos:["HARDEN"],evolucion:"DARKFLY (Nv.12)",pokedex:"They gather around dark alleys and forests in large groups. Although they often appear motionless, this is a hunting tactic used to ambush prey."},
      {id:12,nombre:"Darkfly",tipos:["bug","dark"],bst:397,stats:{hp:50,atk:92,def:54,spa:103,spd:41,spe:57},habilidades:["SHIELDDUST"],hOculta:"TECHNICIAN",movimientos:["LEECHLIFE","BUGBITE","PURSUIT","FURYCUTTER","BITE","PINMISSILE","TORMENT","UTURN","TAUNT","XSCISSOR","SLASH","BUGBUZZ","NIGHTSLASH"],evolucion:"---",pokedex:"They prey on Bugerpunch from other colonies. Often considered the assassins of a colony, they specifically hunt down targets with high bounties."},
      {id:13,nombre:"Whiskrat",tipos:["normal"],bst:241,stats:{hp:40,atk:40,def:39,spa:50,spd:26,spe:46},habilidades:["HUSTLE","GUTS"],hOculta:"QUICKFEET",movimientos:["TACKLE","TAILWHIP","GROWL","QUICKATTACK","BITE","HEADBUTT","TAUNT","STOCKPILE","SWALLOW","SPITUP","HYPERFANG","ENDEAVOR"],evolucion:"ODORENT (Nv.19)",pokedex:"Whiskrat is blind, but it has a strong sense of smell that it uses to navigate. They are widely known as some of the most annoying pests of Banerica."},
      {id:14,nombre:"Odorent",tipos:["normal","poison"],bst:419,stats:{hp:71,atk:87,def:60,spa:101,spd:40,spe:60},habilidades:["HUSTLE","GUTS"],hOculta:"POISONTOUCH",movimientos:["TACKLE","TAILWHIP","GROWL","QUICKATTACK","STOCKPILE","SWALLOW","SPITUP","BITE","HEADBUTT","TAUNT","POISONFANG","HYPERFANG","HONECLAWS","BATONPASS","ENDEAVOR"],evolucion:"KINGRAT (Felicidad)",pokedex:"It visualizes scent trails in its mind, which fully replaces its need for eyes. Not even the faintest of odors can't escape its powerful sense of smell."},
      {id:15,nombre:"Kingrat",tipos:["normal","poison"],bst:492,stats:{hp:105,atk:95,def:74,spa:77,spd:77,spe:64},habilidades:["HUSTLE","GUTS"],hOculta:"POISONTOUCH",movimientos:["LASTRESORT","TACKLE","TAILWHIP","GROWL","QUICKATTACK","STOCKPILE","SWALLOW","SPITUP","BITE","HEADBUTT","TAUNT","POISONFANG","HYPERFANG","HONECLAWS","BATONPASS","ENDEAVOR"],evolucion:"---",pokedex:"Kingrat is empty of mind, but full of joy. After gaining its sense of sight, it becomes a king that enjoys many shiny gifts from its family."},
      {id:16,nombre:"Kiwiki",tipos:["flying","normal"],bst:252,stats:{hp:35,atk:36,def:44,spa:57,spd:36,spe:44},habilidades:["QUICKFEET"],hOculta:"RECKLESS",movimientos:["PECK","GROWL","SANDATTACK","DEFENSECURL","ROLLOUT","FORESIGHT","AGILITY","DOUBLETEAM","DRILLPECK"],evolucion:"KIWALKER (Nv.15)",pokedex:"While Kiwiki are territorial Pokemon, they are too small and weak to defend their territory. Their eggs taste sweet and tart when used in cooking."},
      {id:17,nombre:"Kiwalker",tipos:["flying","normal"],bst:356,stats:{hp:51,atk:70,def:52,spa:75,spd:55,spe:53},habilidades:["QUICKFEET"],hOculta:"RECKLESS",movimientos:["EGGBOMB","PECK","GROWL","SANDATTACK","DEFENSECURL","ROLLOUT","FORESIGHT","WINGATTACK","TAKEDOWN","AGILITY","DOUBLETEAM","DRILLPECK"],evolucion:"ROAKIRUNNER (Nv.33)",pokedex:"Kiwalkers have large wings, yet they prefer walking to flying as it takes less energy. They instead use their wings in a manner closer to body armor."},
      {id:18,nombre:"Roakirunner",tipos:["flying","normal"],bst:518,stats:{hp:67,atk:124,def:67,spa:125,spd:67,spe:68},habilidades:["QUICKFEET"],hOculta:"RECKLESS",movimientos:["PLUCK","PECK","EGGBOMB","SOFTBOILED","GROWL","SANDATTACK","DEFENSECURL","ROLLOUT","FORESIGHT","WINGATTACK","TAKEDOWN","AGILITY","DOUBLETEAM","DRILLPECK","DOUBLEEDGE","BRAVEBIRD"],evolucion:"---",pokedex:"Having adapted to a more grounded lifestyle, Roakirunners use their wings to propel themselves across the ground at incredibly high speeds."},
      {id:19,nombre:"Kittendough",tipos:["fairy"],bst:297,stats:{hp:35,atk:52,def:35,spa:70,spd:42,spe:63},habilidades:["RUNAWAY","NATURALCURE"],hOculta:"UNBURDEN",movimientos:["SCRATCH","SWEETSCENT","BABYDOLLEYES","DISARMINGVOICE","CHARM","DRAININGKISS","ASSIST","PARTINGSHOT","BATONPASS","EXTREMESPEED","PLAYROUGH","ENDEAVOR","HONECLAWS","AGILITY"],evolucion:"CHEEDOUGH (Nv.22)",pokedex:"Kittendough smell like freshly baked cookies. They love to share their chocolate chips with their friends, including humans they trust."},
      {id:20,nombre:"Cheedough",tipos:["fairy"],bst:487,stats:{hp:64,atk:93,def:47,spa:145,spd:63,spe:74},habilidades:["INTIMIDATE","NATURALCURE"],hOculta:"UNBURDEN",movimientos:["SCRATCH","SWEETSCENT","BABYDOLLEYES","DISARMINGVOICE","CHARM","DRAININGKISS","ASSIST","PARTINGSHOT","BATONPASS","EXTREMESPEED","PLAYROUGH","ENDEAVOR","HONECLAWS","AGILITY"],evolucion:"---",pokedex:"Cheedough is the fastest Pokemon of Banerica. The sweet pods that emerge from its body grant those who eat them a fraction of Cheedough's speed."},
      {id:21,nombre:"Mochiron",tipos:["electric"],bst:351,stats:{hp:86,atk:35,def:56,spa:61,spd:58,spe:55},habilidades:["AROMA VEIL","NATURALCURE"],hOculta:"GLUTTONY",movimientos:["SCRATCH","CHARGE","THUNDERSHOCK","BABYDOLLEYES","FAKETEARS","CHARM","NUZZLE","AMNESIA","THUNDERBOLT","SUPERFANG","REFRESH","FOLLOWME","VOLTSWITCH","BODYSLAM","FAKEOUT","PLAYROUGH"],evolucion:"CARONTRON (Felicidad)",pokedex:"Mochiron has an unusual affection towards sweets, to the point it'll go feral. Mochiron love to help others, carrying around naturally produced revives."},
      {id:22,nombre:"Carontron",tipos:["electric"],bst:495,stats:{hp:110,atk:67,def:83,spa:84,spd:76,spe:75},habilidades:["AROMA VEIL","NATURALCURE"],hOculta:"GLUTTONY",movimientos:["SCRATCH","CHARGE","THUNDERSHOCK","BABYDOLLEYES","FAKETEARS","CHARM","NUZZLE","AMNESIA","THUNDERBOLT","SUPERFANG","REFRESH","FOLLOWME","VOLTSWITCH","BODYSLAM","FAKEOUT","PLAYROUGH"],evolucion:"---",pokedex:"Carontron loves sweets to the point it hunts CRIMIDO in organized packs. Despite its ferocity, it sometimes shares food with allies."},
      {id:23,nombre:"Certle",tipos:["grass","ground"],bst:267,stats:{hp:65,atk:40,def:42,spa:20,spd:45,spe:55},habilidades:["SHELLARMOR","STURDY"],hOculta:"WATERABSORB",movimientos:["TACKLE","DEFENSECURL","ABSORB","LEECHSEED","MEGADRAIN","ROLLOUT","TAKEDOWN","CURSE","EARTHQUAKE","SEEDBOMB","EXPLOSION"],evolucion:"CORTOISE (Nv.15)",pokedex:"Certle are friendly, but sometimes explode when frightened. Similarly to Burpider, they hatch from eggs underground, and slowly grow out to land."},
      {id:24,nombre:"Cortoise",tipos:["grass","ground"],bst:401,stats:{hp:80,atk:100,def:50,spa:31,spd:60,spe:80},habilidades:["WATERABSORB","STURDY"],hOculta:"FLUFFY",movimientos:["SANDTOMB","TACKLE","DEFENSECURL","ABSORB","LEECHSEED","MEGADRAIN","ROLLOUT","TAKEDOWN","CURSE","EARTHQUAKE","SEEDBOMB","EXPLOSION"],evolucion:"---",pokedex:"Cortoise can live hundreds of years, and grow larger each year. They let children eat small pieces of their body for a sweet treat. How kind?"},
      {id:25,nombre:"Peaprab",tipos:["grass","water"],bst:286,stats:{hp:38,atk:51,def:60,spa:50,spd:47,spe:40},habilidades:["HYDRATION","HYPERCUTTER"],hOculta:"SWIFTSWIM",movimientos:["SCRATCH","WITHDRAW","ABSORB","BULLETSEED","LEECHSEED","FURYCUTTER","MEGADRAIN","PROTECT","CRABHAMMER","VISEGRIP","XSCISSOR","SHELLSMASH","GUILLOTINE"],evolucion:"PEAPRABBER (Nv.16)",pokedex:"Peaprab uses its shell as a means of camoflague, ambushing unsuspecting prey. They prey on Pokemon much larger than them using this method."},
      {id:26,nombre:"Peaprabber",tipos:["grass","water"],bst:375,stats:{hp:52,atk:68,def:79,spa:62,spd:60,spe:54},habilidades:["HYDRATION","HYPERCUTTER"],hOculta:"SWIFTSWIM",movimientos:["SCRATCH","WITHDRAW","ABSORB","BULLETSEED","LEECHSEED","FURYCUTTER","MEGADRAIN","PROTECT","CRABHAMMER","VISEGRIP","XSCISSOR","SHELLSMASH","GUILLOTINE"],evolucion:"PALAPACE (Nv.35)",pokedex:"They communicate with each other by snapping their claws. The more powerful their snap, the more agitated a Peaprabber usually is."},
      {id:27,nombre:"Palapace",tipos:["grass","water"],bst:525,stats:{hp:64,atk:100,def:136,spa:40,spd:90,spe:95},habilidades:["HYDRATION","HYPERCUTTER"],hOculta:"SWIFTSWIM",movimientos:["SCRATCH","WITHDRAW","ABSORB","BULLETSEED","LEECHSEED","FURYCUTTER","MEGADRAIN","PROTECT","CRABHAMMER","VISEGRIP","XSCISSOR","SHELLSMASH","GUILLOTINE"],evolucion:"---",pokedex:"Palapace always keep their face hidden from the enemy using their shield. Its body behind the shield is incredibly fragile."},
      {id:28,nombre:"Crimido",tipos:["dark"],bst:286,stats:{hp:50,atk:60,def:41,spa:35,spd:55,spe:45},habilidades:["PICKPOCKET","PRANKSTER"],hOculta:"PICKUP",movimientos:["POUND","DEFENSECURL","PURSUIT","THIEF","PAYBACK","FAKEOUT","ROLLOUT","KNOCKOFF","TAUNT","SWITCHEROO","TORMENT","PLAYROUGH"],evolucion:"YAKUNUT (Nv.30)",pokedex:"Crimido are fantastic thieves, which can become a problem with locals. They aren't fast, but are excellent at staying silent with their feet."},
      {id:29,nombre:"Yakunut",tipos:["dark"],bst:510,stats:{hp:81,atk:112,def:70,spa:70,spd:94,spe:83},habilidades:["PICKPOCKET","PRANKSTER"],hOculta:"PICKUP",movimientos:["WILLOWISP","PLAYROUGH","POUND","DEFENSECURL","PURSUIT","THIEF","FAKEOUT","ROLLOUT","KNOCKOFF","TAUNT","PAYBACK","SWITCHEROO","TORMENT","NIGHTSLASH"],evolucion:"---",pokedex:"Yakunut live for the thrill of battle. They prefer getting caught committing crimes for the chance to start a fight, rather than getting away with it."},
      {id:30,nombre:"Sandbrew",tipos:["ground","water"],bst:300,stats:{hp:50,atk:65,def:70,spa:40,spd:50,spe:25},habilidades:["WATERABSORB"],hOculta:"FLAMEBODY",movimientos:["SCRATCH","DEFENSECURL","WATERGUN","SANDATTACK","CAMOUFLAGE","RAPIDSPIN","BUBBLEBEAM","SWIFT","FURYSWIPES","SANDTOMB","SLASH","DIG","SWORDSDANCE","EARTHQUAKE"],evolucion:"BREWSLASH (Nv.22)",pokedex:"Its body is small, and it can seamlessly melt to hide from potential enemies. Sandbrew carry the scent of coffee everywhere they go."},
      {id:31,nombre:"Brewslash",tipos:["ground","water"],bst:450,stats:{hp:65,atk:100,def:90,spa:60,spd:80,spe:55},habilidades:["FLAMEBODY"],hOculta:"WATERABSORB",movimientos:["SCRATCH","DEFENSECURL","WATERGUN","SANDATTACK","CAMOUFLAGE","RAPIDSPIN","BUBBLEBEAM","SWIFT","FURYSWIPES","MUDDYWATER","SLASH","DIG","SWORDSDANCE","EARTHQUAKE"],evolucion:"---",pokedex:"Brewslash can liquify on command, which is a great tool for combat. They effortlessly dodge attacks, and are always beaming with energy."},
      {id:32,nombre:"Pog",tipos:["normal"],bst:296,stats:{hp:90,atk:42,def:38,spa:44,spd:42,spe:40},habilidades:["THICKFAT"],hOculta:"DAMP",movimientos:["TACKLE","GROWL","ASTONISH","MUDSLAP","HEADBUTT","STOCKPILE","SPITUP","SWALLOW","FAKETEARS","BODYSLAM","REST","SNORE","UPROAR","TAKEDOWN","BULKUP"],evolucion:"BLOINKET (Nv.28)",pokedex:"Pogs are often seen attempting to steal blankets as they are always cold no matter the season. They were a common cuisine in ancient times."},
      {id:33,nombre:"Bloinket",tipos:["normal"],bst:487,stats:{hp:110,atk:86,def:85,spa:55,spd:76,spe:75},habilidades:["THICKFAT"],hOculta:"MAGMAARMOR",movimientos:["TACKLE","GROWL","ASTONISH","MUDSLAP","HEADBUTT","STOCKPILE","SPITUP","SWALLOW","FAKETEARS","BODYSLAM","REST","SNORE","UPROAR","TAKEDOWN","BULKUP"],evolucion:"---",pokedex:"Bloinket look like freshly cooked meat thanks to the high heat produced from their bodies. They are considered honorary fire types by most trainers."},
      {id:34,nombre:"Geodude",tipos:["rock","ground"],bst:290,stats:{hp:40,atk:80,def:100,spa:20,spd:30,spe:30},habilidades:["ROCKHEAD","STURDY"],hOculta:"SANDVEIL",movimientos:["TACKLE","DEFENSECURL","MUDSPORT","ROCKTHROW","ROLLOUT","MAGNITUDE","BULLDOZE","SELFDESTRUCT","ROCKBLAST","EARTHQUAKE","EXPLOSION","ENDEAVOR"],evolucion:"GRAVELER (Nv.25)",pokedex:"It throws rocks at people, and sometimes even throws other Geodude at people by mistake. For some reason, they're always angry!"},
      {id:35,nombre:"Graveler",tipos:["rock","ground"],bst:390,stats:{hp:55,atk:95,def:115,spa:35,spd:45,spe:45},habilidades:["ROCKHEAD","STURDY"],hOculta:"SANDVEIL",movimientos:["TACKLE","DEFENSECURL","MUDSPORT","ROCKTHROW","ROLLOUT","MAGNITUDE","BULLDOZE","SELFDESTRUCT","ROCKBLAST","EARTHQUAKE","EXPLOSION","ENDEAVOR"],evolucion:"GOLEM (Intercambio)",pokedex:"They descend from mountains by tumbling down steep slopes. They are so brutal, they smash aside obstructing trees and huge boulders with thunderous tackles."},
      {id:36,nombre:"Golem",tipos:["rock","ground"],bst:495,stats:{hp:80,atk:120,def:130,spa:45,spd:55,spe:65},habilidades:["ROCKHEAD","STURDY"],hOculta:"SANDVEIL",movimientos:["TACKLE","DEFENSECURL","MUDSPORT","ROCKTHROW","ROLLOUT","MAGNITUDE","BULLDOZE","SELFDESTRUCT","ROCKBLAST","EARTHQUAKE","EXPLOSION","ENDEAVOR"],evolucion:"---",pokedex:"It is said to live in volcanic craters on mountain peaks. Once a year, it sheds its hide and grows larger. The shed hide crumbles and returns to the soil."},
      {id:37,nombre:"Fleach",tipos:["flying","bug"],bst:260,stats:{hp:35,atk:42,def:37,spa:56,spd:42,spe:48},habilidades:["SWARM","INFESTED"],hOculta:"---",movimientos:["LEECHLIFE","SUPERSONIC","ASTONISH","INFESTATION","WINGATTACK","BUGBITE","ROOST","ATTACKORDER","DEFENDORDER","SIGNALBEAM","AIRSLASH"],evolucion:"FLEABAT (Nv.20)",pokedex:"Fleach is commonly known as the dirtiest Pokemon. Its fur is matted, and hosts a unique species of Bug-Type Pokemon it controls during battle."},
      {id:38,nombre:"Fleabat",tipos:["flying","bug"],bst:405,stats:{hp:65,atk:80,def:68,spa:103,spd:80,spe:69},habilidades:["SWARM","INFESTED"],hOculta:"---",movimientos:["AIRCUTTER","LEECHLIFE","SUPERSONIC","ASTONISH","INFESTATION","WINGATTACK","BUGBITE","ROOST","ATTACKORDER","DEFENDORDER","SIGNALBEAM","AIRSLASH"],evolucion:"---",pokedex:"A Fleabat must constantly feast on nutrients to satisfy its swarm's needs, as the small Pokemon that live in its fur constantly feed on its life energy."},
      {id:39,nombre:"Diglett",tipos:["ground"],bst:265,stats:{hp:10,atk:55,def:25,spa:95,spd:35,spe:45},habilidades:["SANDVEIL","ARENATRAP"],hOculta:"SANDFORCE",movimientos:["SANDATTACK","SCRATCH","GROWL","ASTONISH","MUDSLAP","MAGNITUDE","DIG","SLASH","SANDSTORM","UPROAR","EARTHQUAKE","FISSURE"],evolucion:"DUGTRIO (Nv.26)",pokedex:"Diglett dig holes that often result in other Pokemon being trapped. Diglett is beloved in southern Banerica, but not as much in northern Banerica."},
      {id:40,nombre:"Dugtrio",tipos:["ground"],bst:425,stats:{hp:35,atk:100,def:50,spa:120,spd:50,spe:70},habilidades:["SANDVEIL","ARENATRAP"],hOculta:"SANDFORCE",movimientos:["SANDATTACK","SCRATCH","GROWL","ASTONISH","MUDSLAP","MAGNITUDE","DIG","SLASH","SANDSTORM","SANDTOMB","UPROAR","EARTHQUAKE","FISSURE"],evolucion:"DUGWEO (Felicidad)",pokedex:"Because the triplets originally split from one body, they think exactly alike. They work cooperatively to burrow endlessly through the ground."},
      {id:41,nombre:"Dugweo",tipos:["ground"],bst:505,stats:{hp:95,atk:120,def:80,spa:100,spd:40,spe:70},habilidades:["SANDVEIL","THICKFAT"],hOculta:"SANDFORCE",movimientos:["BELLYDRUM","SANDATTACK","FURYSWIPES","SCRATCH","GROWL","ASTONISH","MUDSLAP","MAGNITUDE","DIG","SLASH","SANDSTORM","SANDTOMB","UPROAR","EARTHQUAKE","FISSURE"],evolucion:"---",pokedex:"While Dugweo are at the top of the food chain, they are often hunted by humans for their tender meat, which has made them extinct in most of the world."},
      {id:42,nombre:"Sproot",tipos:["grass"],bst:195,stats:{hp:30,atk:30,def:40,spa:30,spd:35,spe:30},habilidades:["RATTLED","CHLOROPHYLL"],hOculta:"---",movimientos:["ABSORB","TAILWHIP","GROWL","MEGADRAIN","STUNSPORE","POISONPOWDER","INGRAIN","DRAININGKISS","LEECHSEED","TAUNT","AROMATHERAPY","GIGADRAIN","DAZZLINGGLEAM","POWERWHIP","METRONOME"],evolucion:"BITTAROOT (Nv.13)",pokedex:"Sproot are very common, and grow incredibly fast. They are considered by many to be among the friendliest creatures to ever exist."},
      {id:43,nombre:"Bittaroot",tipos:["grass"],bst:325,stats:{hp:60,atk:50,def:60,spa:50,spd:55,spe:50},habilidades:["RATTLED","CHLOROPHYLL"],hOculta:"---",movimientos:["ABSORB","TAILWHIP","GROWL","MEGADRAIN","STUNSPORE","POISONPOWDER","INGRAIN","DRAININGKISS","LEECHSEED","TAUNT","AROMATHERAPY","GIGADRAIN","DAZZLINGGLEAM","POWERWHIP","METRONOME"],evolucion:"BITTARULE (Nv.26)",pokedex:"They grow so fast that they often have growing pain. Bittaroot aren't usually eaten by herbivores due to them tasting so bitter."},
      {id:44,nombre:"Bittarule",tipos:["grass"],bst:484,stats:{hp:63,atk:57,def:62,spa:105,spd:98,spe:59},habilidades:["RATTLED","CHLOROPHYLL"],hOculta:"---",movimientos:["ABSORB","TAILWHIP","GROWL","MEGADRAIN","STUNSPORE","POISONPOWDER","INGRAIN","DRAININGKISS","LEECHSEED","TAUNT","AROMATHERAPY","GIGADRAIN","DAZZLINGGLEAM","POWERWHIP","METRONOME"],evolucion:"---",pokedex:"Bittarule nurture and defend colonies of Sproot and Bittaroot as their subjects gather energy to evolve and start their own colonies."},
      {id:45,nombre:"Granix",tipos:["rock","ground"],bst:280,stats:{hp:30,atk:45,def:110,spa:65,spd:30,spe:40},habilidades:["ROCKHEAD","STURDY"],hOculta:"WEAKARMOR",movimientos:["TACKLE","HARDEN","BIND","ROCKTHROW","RAGE","DRAGONDANCE","BULLDOZE"],evolucion:"ONIX (Nv.18)",pokedex:"It's scales are made of rocky plates. It loves to play with other Granix, and search for iron in the soil together. It's very rarely seen in other regions."},
      {id:46,nombre:"Onix",tipos:["rock","ground"],bst:385,stats:{hp:35,atk:65,def:140,spa:70,spd:30,spe:45},habilidades:["ROCKHEAD","STURDY"],hOculta:"WEAKARMOR",movimientos:["BULLDOZE","TACKLE","HARDEN","BIND","ROCKTHROW","RAGE","STEALTHROCK","MAGNITUDE","CURSE","DOUBLEEDGE","DIG","IRONTAIL","HEADSMASH","EXPLOSION","EARTHQUAKE"],evolucion:"OBSILIX (Esfuerzo)",pokedex:"In the region of Banerica, Onix is a lot more aggressive than in other parts of the world. It burrows through the mountains searching for iron to eat."},
      {id:47,nombre:"Obsilix",tipos:["rock"],bst:530,stats:{hp:70,atk:125,def:120,spa:105,spd:55,spe:55},habilidades:["ROCKHEAD","CLEARBODY"],hOculta:"WEAKARMOR",movimientos:["BULLDOZE","TACKLE","HARDEN","BIND","ROCKTHROW","RAGE","STEALTHROCK","MAGNITUDE","CURSE","DOUBLEEDGE","DIG","IRONTAIL","HEADSMASH","EXPLOSION","EARTHQUAKE"],evolucion:"---",pokedex:"The Banerican soil is very rich in Carbos, so the Obsilix in Banerica are much faster than your average Steelix from other regions."},
      {id:48,nombre:"Khopedge",tipos:["fighting"],bst:325,stats:{hp:45,atk:80,def:37,spa:28,spd:35,spe:100},habilidades:["NOGUARD"],hOculta:"---",movimientos:["TACKLE","FURYCUTTER","ARMTHRUST","PURSUIT","METALSOUND","SLASH","VITALTHROW","IRONDEFENSE","BULKUP","SWORDSDANCE","SACREDSWORD"],evolucion:"RAEGISLASH (Nv.35)",pokedex:"Its blade is made with high quality 1095 carbon steel. It marks tallies on its arm for each victory in a battle."},
      {id:49,nombre:"Raegislash",tipos:["steel","fighting"],bst:500,stats:{hp:60,atk:140,def:50,spa:60,spd:50,spe:140},habilidades:["NOGUARD"],hOculta:"---",movimientos:["PROTECT","TACKLE","FURYCUTTER","ARMTHRUST","PURSUIT","METALSOUND","SLASH","VITALTHROW","IRONDEFENSE","BULKUP","SWORDSDANCE","SACREDSWORD","IRONTAIL"],evolucion:"---",pokedex:"These creatures are ancient, and live for thousands of years. There's a good chance a random Raegislash worked on a pirate crew many generations ago."},
      {id:50,nombre:"Drowl",tipos:["flying"],bst:279,stats:{hp:53,atk:38,def:38,spa:43,spd:60,spe:47},habilidades:["EARLYBIRD"],hOculta:"MAGICGUARD",movimientos:["FEATHERDANCE","DEFENSECURL","GUST","HYPNOSIS","CONFUSION","SWIFT","PSYWAVE","AIRCUTTER","CONFUSERAY","SKILLSWAP","PSYCHIC","DREAMEATER"],evolucion:"NOCTRANCE (Nv.25)",pokedex:"Drowl spends almost all of the day sleeping, but become very energetic during the night, or when it's time to battle."},
      {id:51,nombre:"Noctrance",tipos:["flying","psychic"],bst:475,stats:{hp:80,atk:45,def:61,spa:104,spd:115,spe:70},habilidades:["KEENEYE"],hOculta:"MAGICGUARD",movimientos:["FEATHERDANCE","DEFENSECURL","GUST","HYPNOSIS","CONFUSION","SWIFT","PSYWAVE","AIRCUTTER","CONFUSERAY","SKILLSWAP","PSYCHIC","DREAMEATER"],evolucion:"---",pokedex:"They hypnotize Whiskrat to sleep, then eat all of their good dreams. When seen at a windowsill, it's believed to be a sign of death."},
      {id:52,nombre:"Gutank",tipos:["steel","poison"],bst:340,stats:{hp:56,atk:62,def:67,spa:25,spd:50,spe:80},habilidades:["ANALYTIC","SUCTIONCUPS"],hOculta:"SCREENCLEANER",movimientos:["POUND","HARDEN","POISONGAS","ACID","METALCLAW","LOCKON","VACUUMWAVE","MUDSHOT","SLUDGEWAVE","AMNESIA","SLUDGEBOMB","IRONDEFENSE","IRONHEAD","GUNKSHOT"],evolucion:"GRETANK (Nv.37)",pokedex:"Gutank is a man-made Pokemon that was designed for cleaning! They love to clean, and often compete with each other to see who can gather the most trash."},
      {id:53,nombre:"Gretank",tipos:["steel","poison"],bst:485,stats:{hp:76,atk:100,def:85,spa:40,spd:79,spe:105},habilidades:["ANALYTIC","SUCTIONCUPS"],hOculta:"SCREENCLEANER",movimientos:["PURIFY","POUND","HARDEN","POISONGAS","ACID","METALCLAW","LOCKON","VACUUMWAVE","MUDSHOT","SLUDGEWAVE","AMNESIA","SLUDGEBOMB","IRONDEFENSE","IRONHEAD","GUNKSHOT"],evolucion:"---",pokedex:"Gretank are expensive to hire. They are the industrial janitors of the Banerica Region. Most six-figure businesses can't even afford a Gretank."},
      {id:54,nombre:"Tiraki",tipos:["poison"],bst:265,stats:{hp:50,atk:40,def:45,spa:30,spd:30,spe:70},habilidades:["STENCH","POISONTOUCH"],hOculta:"---",movimientos:["HARDEN","TACKLE","FLAIL","POISONGAS","CHARM","SLUDGE","PROTECT","TOXIC"],evolucion:"FETRAWL (Nv.30)",pokedex:"It doesn't need to be strong to defend itself as most Pokemon who eat it will become fatally ill."},
      {id:55,nombre:"Fetrawl",tipos:["poison","fighting"],bst:540,stats:{hp:100,atk:130,def:110,spa:70,spd:50,spe:80},habilidades:["STENCH","IRONFIST"],hOculta:"---",movimientos:["MACHPUNCH","CHARM","HARDEN","TACKLE","FLAIL","POISONGAS","SLUDGE","ARMTHRUST","PROTECT","TOXIC","POISONJAB","SUCKERPUNCH","SUPERPOWER","GUNKSHOT"],evolucion:"---",pokedex:"Corvonic will continuously fly around Fetrawl's young for reason but to make the Fetrawl angry. They train with each other and even hold tournaments."},
      {id:56,nombre:"Vidofage",tipos:["electric","bug"],bst:395,stats:{hp:70,atk:45,def:70,spa:88,spd:52,spe:70},habilidades:["STATIC"],hOculta:"---",movimientos:["POISONSTING","THUNDERWAVE","LEER","THUNDERSHOCK","STICKYWEB","BUGBITE","TOXIC","THUNDER","AGILITY","MINIMIZE","BATONPASS"],evolucion:"---",pokedex:"Vidofage attaches itself to its victim, and sucks the energy out of them using its red fangs. The energy is converted into electrical energy."},
      {id:57,nombre:"Polowoodo",tipos:["grass"],bst:353,stats:{hp:45,atk:46,def:65,spa:50,spd:75,spe:72},habilidades:["PRANKSTER"],hOculta:"---",movimientos:["TACKLE","LEER","VINEWHIP","POISONPOWDER","ARMTHRUST","ACID","RAZORLEAF","MIRACLEEYE","ENERGYBALL","SLUDGEBOMB"],evolucion:"POLUTOWOODO (Nv.27)",pokedex:"They are quite friendly, but love to play tricks on people passing by. They don't do it out of hatred, but only out of humor."},
      {id:58,nombre:"Polutowoodo",tipos:["grass","poison"],bst:512,stats:{hp:65,atk:76,def:86,spa:95,spd:110,spe:80},habilidades:["CORROSION"],hOculta:"---",movimientos:["SLUDGE","ARMTHRUST","TACKLE","LEER","VINEWHIP","POISONPOWDER","CONFUSERAY","ACID","RAZORLEAF","MIRACLEEYE","ENERGYBALL","SLUDGEBOMB","DESTINYBOND","PSYCHIC","GRUDGE"],evolucion:"---",pokedex:"Polutowoodo has a rivalry with Gretank. It will take time out of it's day to re-polute an enviroment that was just recently cleaned up. How rude?"},
      {id:59,nombre:"Borvic",tipos:["dark","flying"],bst:366,stats:{hp:62,atk:60,def:47,spa:54,spd:68,spe:75},habilidades:["IMMUNITY","UNNERVE"],hOculta:"POISONHEAL",movimientos:["PECK","ASTONISH","SMOG","MEANLOOK","NIGHTSHADE","SCARYFACE","PURSUIT","PERISHSONG","PSYBEAM","CURSE","DARKPULSE","OMINOUSWIND","TOXIC","NASTYPLOT","PSYCHIC"],evolucion:"CORVONIC (Nv.38)",pokedex:"Flocks of Borvic tend to come around when death is immenent. Borvic will sit motionless, and stare at the perishing life of the suffering until it passes."},
      {id:60,nombre:"Corvonic",tipos:["dark","psychic"],bst:515,stats:{hp:90,atk:70,def:70,spa:75,spd:90,spe:120},habilidades:["IMMUNITY","UNNERVE"],hOculta:"POISONHEAL",movimientos:["ACIDSPRAY","PECK","ASTONISH","SMOG","MEANLOOK","NIGHTSHADE","SCARYFACE","PURSUIT","PERISHSONG","PSYBEAM","CURSE","DARKPULSE","OMINOUSWIND","TOXIC","NASTYPLOT","PSYCHIC"],evolucion:"---",pokedex:"Plague follows Corvonic wherever it goes. It's said the evil will see a Corvonic staring at them as they pass away, but no one else can see it."},
      {id:61,nombre:"Mushboom",tipos:["fire"],bst:280,stats:{hp:75,atk:45,def:50,spa:15,spd:50,spe:45},habilidades:["EFFECTSPORE","AFTERMATH"],hOculta:"FLASHFIRE",movimientos:["ASTONISH","ABSORB","STUNSPORE","SLEEPPOWDER","SMOKESCREEN","EMBER","STOCKPILE","SELFDESTRUCT","FOCUSENERGY","PROTECT","EXPLOSION","KABOOM","FLAMETHROWER"],evolucion:"KASHROOM (Nv.21)",pokedex:"This hot headed Pokemon is a danger to travelers that aren't watching their step in the forest. Following that, it's pretty much an instant explosion."},
      {id:62,nombre:"Kashroom",tipos:["fire"],bst:389,stats:{hp:95,atk:65,def:72,spa:20,spd:72,spe:65},habilidades:["EFFECTSPORE","AFTERMATH"],hOculta:"FLASHFIRE",movimientos:["INCINERATE","ASTONISH","ABSORB","STUNSPORE","SLEEPPOWDER","SMOKESCREEN","EMBER","STOCKPILE","SELFDESTRUCT","FOCUSENERGY","PROTECT","EXPLOSION","KABOOM","FLAMETHROWER"],evolucion:"CATASHROOME (Nv.42)",pokedex:"It has a short fuse. When it becomes angry, it's only a matter of time before it explodes damaging everything in the vicinity."},
      {id:63,nombre:"Catashroome",tipos:["fire"],bst:505,stats:{hp:140,atk:85,def:80,spa:30,spd:90,spe:80},habilidades:["DROUGHT","AFTERMATH"],hOculta:"FLASHFIRE",movimientos:["INCINERATE","ASTONISH","ABSORB","STUNSPORE","SLEEPPOWDER","SMOKESCREEN","EMBER","STOCKPILE","SELFDESTRUCT","FOCUSENERGY","PROTECT","EXPLOSION","KABOOM","FLAMETHROWER","INFERNO","FINALGAMBIT"],evolucion:"---",pokedex:"The caps on these Pokemon are a delicacy if prepared correctly. If prepared incorrectly, the cap will explode instantly as the consumer takes a bite."},
      {id:64,nombre:"Marinyan",tipos:["water"],bst:375,stats:{hp:65,atk:70,def:65,spa:20,spd:75,spe:80},habilidades:["TRUANT"],hOculta:"THICKFAT",movimientos:["WATERGUN","MUDSLAP","YAWN","SLACKOFF","WATERPULSE","CURSE","REST","AMNESIA","BODYSLAM","BELLYDRUM","HYDROPUMP"],evolucion:"NEKOCEAN (Nv.23)",pokedex:"It spends most of the day asleep at the bottom of lakes. Although they prefer fresh water, they can survive in salt water, and even on land!"},
      {id:65,nombre:"Nekocean",tipos:["water"],bst:455,stats:{hp:100,atk:80,def:65,spa:30,spd:80,spe:100},habilidades:["UNAWARE"],hOculta:"THICKFAT",movimientos:["WATERGUN","MUDSLAP","YAWN","SLACKOFF","WATERPULSE","CURSE","REST","AMNESIA","BODYSLAM","BELLYDRUM","HYDROPUMP"],evolucion:"---",pokedex:"It's a very curious Pokemon. It will often come out of the water and hang out with people for the entire day. It eats over a ton of food in a single day!"},
      {id:66,nombre:"Charopcorn",tipos:["fire"],bst:425,stats:{hp:40,atk:74,def:53,spa:111,spd:112,spe:35},habilidades:["FLASHFIRE"],hOculta:"ANGERPOINT",movimientos:["SPLASH","TACKLE","LEER","FOCUSENERGY","EMBER","FLAIL","SWAGGER","TAKEDOWN","FIRESPIN","QUICKATTACK","WILDFIRE","ERUPTION","FLAMETHROWER","WILLOWISP","BURNUP"],evolucion:"---",pokedex:"It cannot handle being hot, but it rarely ever cools down. This results in Charopcorn being in constant misery and filled with anger."},
      {id:67,nombre:"Magikarp",tipos:["water"],bst:200,stats:{hp:20,atk:10,def:55,spa:80,spd:15,spe:20},habilidades:["SWIFTSWIM"],hOculta:"RATTLED",movimientos:["SPLASH","TACKLE","FLAIL"],evolucion:"GYARADOS (Nv.20)",pokedex:"Its swimming muscles are weak, so it is easily washed away by currents. In places where water pools, you can see many Magikarp deposited there by the flow."},
      {id:68,nombre:"Gyarados",tipos:["water","flying"],bst:540,stats:{hp:95,atk:125,def:79,spa:81,spd:60,spe:100},habilidades:["INTIMIDATE"],hOculta:"MOXIE",movimientos:["BITE","THRASH","DRAGONRAGE","TWISTER","HYDROPUMP","RAINDANCE","DRAGONDANCE","HYPERBEAM"],evolucion:"---",pokedex:"It is an extremely vicious and violent Pokémon. When humans begin to fight, it will appear and burn everything to the ground with intensely hot flames."},
      {id:69,nombre:"Carvanha",tipos:["water","dark"],bst:305,stats:{hp:45,atk:90,def:20,spa:65,spd:65,spe:20},habilidades:["ROUGHSKIN"],hOculta:"SPEEDBOOST",movimientos:["BITE","LEER","RAGE","FOCUSENERGY","AQUAJET","CRUNCH","SCARYFACE","SCREECH","JAWLOCK","DIVE","TAUNT","AGILITY","SKULLBASH"],evolucion:"SHARPEDO (Nv.30)",pokedex:"Carvanha attack ships in swarms, making them sink. Although it is said to be a very vicious Pokémon, it timidly flees as soon as it finds itself alone."},
      {id:70,nombre:"Sharpedo",tipos:["water","dark"],bst:460,stats:{hp:70,atk:120,def:40,spa:95,spd:95,spe:40},habilidades:["ROUGHSKIN"],hOculta:"SPEEDBOOST",movimientos:["BITE","LEER","RAGE","FOCUSENERGY","AQUAJET","CRUNCH","SCARYFACE","SCREECH","JAWLOCK","DIVE","TAUNT","AGILITY","SKULLBASH"],evolucion:"---",pokedex:"The vicious and sly gangster of the sea. Its skin is specially textured to minimize drag in water. Its speed tops out at over 75 miles per hour."},
      {id:71,nombre:"Warroach",tipos:["bug"],bst:195,stats:{hp:25,atk:35,def:30,spa:45,spd:30,spe:30},habilidades:["RATTLED"],hOculta:"---",movimientos:["DEFENSECURL","LEECHLIFE","TACKLE","DETECT","BUGBITE"],evolucion:"CORENCE (Nv.25)",pokedex:"Warroach is so skittish, that sometimes it flees from its own shadow. It will eat just about anything, including houses."},
      {id:72,nombre:"Corence",tipos:["bug"],bst:434,stats:{hp:75,atk:84,def:60,spa:85,spd:80,spe:50},habilidades:["RATTLED"],hOculta:"IMMUNITY",movimientos:["DEFENSECURL","LEECHLIFE","BUGBITE","DETECT","CURSE","ROLLOUT","IRONDEFENSE","TAKEDOWN","FURYCUTTER"],evolucion:"ROACHWRATH (Nv.50)",pokedex:"Most Warroach don't live long enough to evolve into Corence. They spend most of the day sitting still, growing, and gathering energy."},
      {id:73,nombre:"Roachwrath",tipos:["bug","dragon"],bst:555,stats:{hp:85,atk:130,def:70,spa:110,spd:100,spe:60},habilidades:["PRESSURE"],hOculta:"IMMUNITY",movimientos:["OUTRAGE","DEFENSECURL","LEECHLIFE","BUGBITE","DETECT","CURSE","ROLLOUT","LEER","TACKLE","SCARYFACE","DRAGONRAGE","IRONDEFENSE","TAKEDOWN","FURYCUTTER","DRAGONDANCE","HYPERBEAM","RECOVER"],evolucion:"---",pokedex:"The true power in Roachwrath has been awoken. Once they reach this final form, they are said to be nearly immortal. They're truly a beast."},
      {id:74,nombre:"Chompaw",tipos:["steel"],bst:295,stats:{hp:40,atk:75,def:60,spa:50,spd:30,spe:40},habilidades:["STRONGJAW","ANALYTIC"],hOculta:"JUSTIFIED",movimientos:["TACKLE","HOWL","ROAR","BITE","METALCLAW","REVERSAL","TAKEDOWN","SCARYFACE","GEARGRIND","MAGNETRISE","CRUNCH","IRONTAIL"],evolucion:"JAWBULL (Nv.22)",pokedex:"It's commonly judged for being aggressive, but it's actually one of the sweetest Pokemon. Trainers who show it hatred will cause Chompaw to grow evil."},
      {id:75,nombre:"Jawbull",tipos:["steel"],bst:485,stats:{hp:67,atk:108,def:100,spa:80,spd:65,spe:65},habilidades:["STRONGJAW","ANALYTIC"],hOculta:"JUSTIFIED",movimientos:["TACKLE","HOWL","ROAR","BITE","METALCLAW","REVERSAL","TAKEDOWN","SCARYFACE","SHIFTGEAR","IRONHEAD","CRUNCH","IRONTAIL"],evolucion:"---",pokedex:"When it bites down, it will not let go as long as the victim is squirming. It's bite is strong enough to completely crush down thick steel."},
      {id:76,nombre:"Jeepilus",tipos:["bug","steel"],bst:380,stats:{hp:30,atk:100,def:80,spa:100,spd:30,spe:40},habilidades:["SLOWSTART"],hOculta:"---",movimientos:["DEFENSECURL","RAPIDSPIN","ROLLOUT","PROTECT","GYROBALL","BUGBITE","HEAVYSLAM","UTURN","SHIFTGEAR","IRONHEAD","AUTOTOMIZE"],evolucion:"NAUTIWHEEL (Nv.33)",pokedex:"Jeepilus have a hard time trying to get moving, and they can not be stopped once they do. They will roll around endlessly at high speeds."},
      {id:77,nombre:"Nautiwheel",tipos:["bug","steel"],bst:400,stats:{hp:50,atk:100,def:80,spa:100,spd:30,spe:40},habilidades:["SPEEDBOOST"],hOculta:"---",movimientos:["TAKEDOWN","DEFENSECURL","RAPIDSPIN","ROLLOUT","PROTECT","GYROBALL","BUGBITE","HEAVYSLAM","UTURN","SHIFTGEAR","IRONHEAD","AUTOTOMIZE"],evolucion:"---",pokedex:"Nautiwheel are used by delivery services for their speed. Unfortunately, they aren't steady enough to deliver fragile goods or food."},
      {id:78,nombre:"Wooper",tipos:["water","ground"],bst:240,stats:{hp:55,atk:45,def:45,spa:15,spd:25,spe:25},habilidades:["DAMP","WATERABSORB"],hOculta:"UNAWARE",movimientos:["WATERGUN","TAILWHIP","MUDSLAP","SLAM","MUDSHOT","AMNESIA","AQUATAIL","YAWN","EARTHQUAKE","HAZE","MIST"],evolucion:"QUAGSIRE (Nv.20)",pokedex:"Wooper usually live in water but come out onto land seeking food occasionally. On land, they coat their bodies with a gooey, toxic film."},
      {id:79,nombre:"Quagsire",tipos:["water","ground"],bst:430,stats:{hp:95,atk:85,def:85,spa:35,spd:65,spe:65},habilidades:["DAMP","WATERABSORB"],hOculta:"UNAWARE",movimientos:["MUDDYWATER","WATERGUN","TAILWHIP","MUDSLAP","SLAM","MUDSHOT","AMNESIA","AQUATAIL","YAWN","EARTHQUAKE","HAZE","MIST"],evolucion:"---",pokedex:"A Quagsire hunts by leaving its mouth wide open in water and waiting for its prey to blunder in. Because it doesn't move, it does not get very hungry."},
      {id:80,nombre:"Koffing",tipos:["fairy"],bst:335,stats:{hp:40,atk:65,def:95,spa:35,spd:60,spe:45},habilidades:["LEVITATE"],hOculta:"STENCH",movimientos:["SWEETSCENT","TACKLE","FAIRYWIND","SELFDESTRUCT","DRAININGKISS","SMOKESCREEN","BITE","DARKPULSE","EXPLOSION","PAINSPLIT"],evolucion:"WEEZING (Dusk Stone)",pokedex:"Getting close to Koffing will reveal a strong scent of sweetness overwhelming enough to make people pass out. They're sweet, caring Pokémon."},
      {id:81,nombre:"Weezing",tipos:["fairy"],bst:490,stats:{hp:65,atk:90,def:120,spa:60,spd:85,spe:70},habilidades:["TWOFACED"],hOculta:"LEVITATE",movimientos:["CRUNCH","SWEETSCENT","TACKLE","FAIRYWIND","MEMENTO"],evolucion:"---",pokedex:"After contacted by a Dusk Stone, Weezing finds a dark side of itself. Each side of Weezing controls by taking turns. However, some Weezing aren't affected by this."},
      {id:82,nombre:"Loliwag",tipos:["fairy"],bst:300,stats:{hp:40,atk:50,def:40,spa:90,spd:40,spe:40},habilidades:["STICKYHOLD"],hOculta:"SWEETVEIL",movimientos:["BABYDOLLEYES","POUND","CHARM","FAIRYWIND","DOUBLESLAP","HYPNOSIS","DRAININGKISS","BODYSLAM","BELLYDRUM","PLAYROUGH"],evolucion:"LOLIWHIRL (Nv.25)",pokedex:"They stick to anything, besides a slipperly Slipeel! Once they stick to an object, Loliwag uses its powerful tail to lunge itself off."},
      {id:83,nombre:"Loliwhirl",tipos:["fairy"],bst:385,stats:{hp:65,atk:65,def:65,spa:90,spd:50,spe:50},habilidades:["STICKYHOLD"],hOculta:"SWEETVEIL",movimientos:["BABYDOLLEYES","POUND","CHARM","FAIRYWIND","DOUBLESLAP","HYPNOSIS","DRAININGKISS","BODYSLAM","BELLYDRUM","PLAYROUGH","DOUBLEEDGE"],evolucion:"LOLIWRATH (Shiny Stone) / LOLITOED (Trade King's Rock)",pokedex:"Its body surface is incredibly sticky, allowing Loliwhirl to stick to its foe, and attack the foe with aimless, fast punches."},
      {id:84,nombre:"Loliwrath",tipos:["fairy","fighting"],bst:510,stats:{hp:90,atk:95,def:95,spa:80,spd:60,spe:90},habilidades:["STICKYHOLD"],hOculta:"SHEERFORCE",movimientos:["SUCKERPUNCH","BABYDOLLEYES","POUND","CHARM","DISARMINGVOICE","PIXIEPUNCH","DYNAMICPUNCH","SUBMISSION"],evolucion:"---",pokedex:"When in battle, its punches will stick to the enemy. It can then slam the enemy around aimlessly until the enemy breaks free of the sticky hold."},
      {id:85,nombre:"Lolitoed",tipos:["fairy"],bst:500,stats:{hp:90,atk:75,def:75,spa:70,spd:90,spe:100},habilidades:["STICKYHOLD"],hOculta:"REGENERATOR",movimientos:["PERISHSONG","BABYDOLLEYES","POUND","CHARM","DISARMINGVOICE","RECOVER","FOCUSBLAST","MOONBLAST"],evolucion:"---",pokedex:"Lolitoed are always the leaders among its peers. They are natively peaceful, and would much rather solve an issue with peace over violence."},
      {id:86,nombre:"Soukie",tipos:["ghost"],bst:366,stats:{hp:41,atk:92,def:55,spa:69,spd:48,spe:61},habilidades:["INNERFOCUS","INFILTRATOR"],hOculta:"MOLDBREAKER",movimientos:["MEANLOOK","LEER","ASTONISH","QUICKATTACK","GLARE","SCARYFACE","REVERSAL","SHADOWCLAW","SHADOWSNEAK","PAYBACK","CURSE","SACREDSWORD","DESTINYBOND"],evolucion:"SOULASTER (Nv.34)",pokedex:"This Pokemon wields a dagger instead of a sword because its too tiny to carry a sword. It gets angry whenever somebody denies that its dagger is indeed a sword."},
      {id:87,nombre:"Soulaster",tipos:["ghost","fighting"],bst:473,stats:{hp:49,atk:127,def:72,spa:98,spd:55,spe:72},habilidades:["INNERFOCUS","INFILTRATOR"],hOculta:"MOLDBREAKER",movimientos:["SWORDSDANCE","MEANLOOK","LEER","ASTONISH","QUICKATTACK","GLARE","SCARYFACE","REVERSAL","SHADOWCLAW","SHADOWSNEAK","PAYBACK","CURSE","SACREDSWORD","DESTINYBOND"],evolucion:"---",pokedex:"The sword doesn't need to penetrate the foe for its curse to take effect. Soulaster's curse will drain your energy until you inevitably faint."},
      {id:88,nombre:"Emolusc",tipos:["dark","fairy"],bst:380,stats:{hp:45,atk:40,def:40,spa:70,spd:85,spe:90},habilidades:["INTERFERENCE","CUTECHARM"],hOculta:"CONTRARY",movimientos:["FAKETEARS","CONFUSION","CONFUSERAY","EMBARGO","DISARMINGVOICE","LOVELYKISS","PURSUIT","FOULPLAY","FLATTER","KNOCKOFF","PAINSPLIT","DARKPULSE","MOONBLAST"],evolucion:"GOTHINC (Nv.30)",pokedex:"It appears emotionless unless it's comfortable around you. If it's comfortable around you, Emolusc is the most emotional creature to exist."},
      {id:89,nombre:"Gothinc",tipos:["dark","fairy"],bst:480,stats:{hp:60,atk:60,def:56,spa:90,spd:107,spe:107},habilidades:["INTERFERENCE","CUTECHARM"],hOculta:"CONTRARY",movimientos:["DRAININGKISS","FAKETEARS","CONFUSION","CONFUSERAY","EMBARGO","DISARMINGVOICE","LOVELYKISS","PURSUIT","FOULPLAY","FLATTER","KNOCKOFF","PAINSPLIT","DARKPULSE","MOONBLAST"],evolucion:"---",pokedex:"Its power depends on its mood. When Gothinc has a mood swing in the negative direction, its attacks become more powerful, but inaccurate."},
      {id:90,nombre:"Skitty",tipos:["ghost"],bst:280,stats:{hp:55,atk:50,def:45,spa:55,spd:40,spe:35},habilidades:["FRISK","CONTRARY"],hOculta:"CURSEDBODY",movimientos:["LICK","MEANLOOK","TAILWHIP","TACKLE","PERISHSONG","COPYCAT","ASSIST","HAUNTEDCRY","SHADOWBALL","SPITE","FEINTATTACK","CURSE","DOUBLEEDGE","HYPNOSIS"],evolucion:"DELCATTY (Dusk Stone)",pokedex:"A Skitty's adorably cute behavior makes it highly popular. It has Ghost-Type powers, but no one knows where they came from."},
      {id:91,nombre:"Delcatty",tipos:["ghost"],bst:440,stats:{hp:75,atk:70,def:70,spa:90,spd:75,spe:60},habilidades:["FRISK","CONTRARY"],hOculta:"CURSEDBODY",movimientos:["SUBSTITUTE","LICK","MEANLOOK","TAILWHIP","OMINOUSWIND"],evolucion:"---",pokedex:"Delcatty has the ability to phase, and see through walls. They can detect life forms from energy alone."},
      {id:92,nombre:"Jinghoul",tipos:["steel","ghost"],bst:355,stats:{hp:45,atk:45,def:90,spa:40,spd:45,spe:90},habilidades:["SOUNDPROOF"],hOculta:"---",movimientos:["TAKEDOWN","ASTONISH","CURSE","METALCLAW","IRONDEFENSE","HEALBELL","PERISHSONG","WILLOWISP"],evolucion:"RINGEIST (Nv.30)",pokedex:"Jinghoul hang from trees or ceilings of abandoned buildings. They chime to lure in prey before using their sharp claw to attack. Jinghoul hate Chingling."},
      {id:93,nombre:"Ringeist",tipos:["steel","ghost"],bst:463,stats:{hp:68,atk:55,def:120,spa:45,spd:55,spe:120},habilidades:["SOUNDPROOF"],hOculta:"---",movimientos:["NIGHTSHADE","TAKEDOWN","ASTONISH","CURSE","IRONDEFENSE","HEALBELL","PERISHSONG","WILLOWISP","OMINOUSWIND","IRONHEAD"],evolucion:"BELLURKER (Nv.45)",pokedex:"Ringeist are known to lurk in dark places until night falls. Their armor is very tough."},
      {id:94,nombre:"Bellurker",tipos:["steel","ghost"],bst:518,stats:{hp:68,atk:100,def:110,spa:50,spd:80,spe:110},habilidades:["SOUNDPROOF"],hOculta:"---",movimientos:["SHADOWCLAW","TAKEDOWN","ASTONISH","CURSE","IRONDEFENSE","HEALBELL","PERISHSONG","WILLOWISP","OMINOUSWIND","IRONHEAD"],evolucion:"---",pokedex:"When Ringeist evolve, they come out from under the armor a lot more often due to their enhanced offensive capabilities. This weakens their overall defense."},
      {id:95,nombre:"Sandile",tipos:["ground","dark"],bst:292,stats:{hp:50,atk:72,def:35,spa:65,spd:35,spe:35},habilidades:["INTIMIDATE","MOXIE"],hOculta:"ANGERPOINT",movimientos:["LEER","SANDATTACK","HONECLAWS","SANDTOMB","SCARYFACE","BITE","TORMENT","DIG","SWAGGER","CRUNCH","SANDSTORM","FOULPLAY","EARTHQUAKE","THRASH"],evolucion:"KROKOROK (Nv.29)",pokedex:"It moves along below the sand's surface, except for its nose and eyes. A dark membrane shields its eyes from the sun."},
      {id:96,nombre:"Krokorok",tipos:["ground","dark"],bst:351,stats:{hp:60,atk:82,def:45,spa:74,spd:45,spe:45},habilidades:["INTIMIDATE","MOXIE"],hOculta:"ANGERPOINT",movimientos:["LEER","SANDATTACK","HONECLAWS","SANDTOMB","SCARYFACE","BITE","TORMENT","DIG","SWAGGER","CRUNCH","SANDSTORM","FOULPLAY","EARTHQUAKE","THRASH"],evolucion:"KROOKODILE (Nv.40)",pokedex:"The special membrane covering its eyes can sense the heat of objects, so it can see its surroundings, even in darkness."},
      {id:97,nombre:"Krookodile",tipos:["ground","dark"],bst:519,stats:{hp:95,atk:117,def:80,spa:92,spd:65,spe:70},habilidades:["INTIMIDATE","MOXIE"],hOculta:"ANGERPOINT",movimientos:["LEER","SANDATTACK","HONECLAWS","SANDTOMB","SCARYFACE","BITE","TORMENT","DIG","SWAGGER","CRUNCH","SANDSTORM","FOULPLAY","EARTHQUAKE","THRASH","OUTRAGE"],evolucion:"---",pokedex:"It can expand the focus of its eyes, enabling it to see objects in the far distance as if it were using binoculars."},
      {id:98,nombre:"Outwren",tipos:["flying","dark"],bst:375,stats:{hp:50,atk:70,def:51,spa:81,spd:63,spe:60},habilidades:["SANDVEIL","SANDRUSH"],hOculta:"INNERFOCUS",movimientos:["QUICKATTACK","SANDATTACK","MUDSLAP","THIEF","WINGATTACK","SPIKES","PINMISSILE","DIG","DRILLPECK","SUCKERPUNCH","NEEDLEARM","SPIKYSHIELD"],evolucion:"ACTROGUEN (Nv.27)",pokedex:"Outwren live in the Banerica Desert as rogues. They often don't make friends, nor do they often build trust."},
      {id:99,nombre:"Actroguen",tipos:["flying","dark"],bst:498,stats:{hp:60,atk:110,def:71,spa:111,spd:73,spe:73},habilidades:["SANDVEIL","SANDRUSH"],hOculta:"INNERFOCUS",movimientos:["NIGHTWING","DEFOG","QUICKATTACK","SANDATTACK","MUDSLAP","THIEF","WINGATTACK","SPIKES","PINMISSILE","DIG","DRILLPECK","SUCKERPUNCH","NEEDLEARM","SPIKYSHIELD"],evolucion:"---",pokedex:"Actroguen are scavengers, but they aren't afraid to attack if they think they'll win. This makes it hard for travelers passing through the desert."},
      {id:100,nombre:"Unown",tipos:["psychic"],bst:336,stats:{hp:48,atk:72,def:48,spa:48,spd:72,spe:48},habilidades:["LEVITATE"],hOculta:"---",movimientos:["HIDDENPOWER"],evolucion:"UNIMAGEAN (Secret Power)",pokedex:"This Pokémon is shaped like ancient text characters. Although research is ongoing, it is a mystery as to which came first, the ancient writings or the various Unown."},

];;

        // ============================================================
        //  🛠️  LÓGICA DE FILTRADO Y RENDERIZADO
        // ============================================================

        let currentPage = 1;
        const itemsPerPage = 24;

        // Obtener tipos únicos
        const allTypes = [...new Set(pokemonData.flatMap(p => p.tipos))].sort();

        // Generar filtros de tipos
        const typeFiltersDiv = document.getElementById('typeFilters');
        allTypes.forEach(type => {
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = type;
            cb.checked = true;
            cb.className = 'type-checkbox';
            label.appendChild(cb);
            label.appendChild(document.createTextNode(type.charAt(0).toUpperCase() + type.slice(1)));
            typeFiltersDiv.appendChild(label);
        });

        // Elementos DOM
        const searchInput = document.getElementById('searchInput');
        const bstSlider = document.getElementById('bstSlider');
        const bstValue = document.getElementById('bstValue');
        const grid = document.getElementById('pokemonGrid');
        const pagination = document.getElementById('pagination');
        const resultsInfo = document.getElementById('resultsInfo');
        const totalCount = document.getElementById('totalCount');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        // Actualizar valor BST
        bstSlider.addEventListener('input', () => {
            bstValue.textContent = bstSlider.value;
            currentPage = 1;
            render();
        });

        // Eventos de filtrado
        searchInput.addEventListener('input', () => { currentPage = 1;
            render(); });
        document.querySelectorAll('.type-checkbox').forEach(cb => cb.addEventListener('change', () => { currentPage = 1;
            render(); }));

        // Cerrar modal
        modalClose.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') modal.classList.remove('active');
        });

        function getTypeClass(type) {
            const map = {
                'grass': 'grass',
                'fire': 'fire',
                'water': 'water',
                'electric': 'electric',
                'psychic': 'psychic',
                'ice': 'ice',
                'dragon': 'dragon',
                'dark': 'dark',
                'fairy': 'fairy',
                'fighting': 'fighting',
                'flying': 'flying',
                'poison': 'poison',
                'ground': 'ground',
                'rock': 'rock',
                'bug': 'bug',
                'ghost': 'ghost',
                'steel': 'steel',
                'normal': 'normal'
            };
            return map[type] || 'normal';
        }

        function getFilteredData() {
            const search = searchInput.value.toLowerCase().trim();
            const minBST = parseInt(bstSlider.value) || 0;
            const activeTypes = [...document.querySelectorAll('.type-checkbox:checked')].map(cb => cb.value);

            return pokemonData.filter(p => {
                // Búsqueda por nombre o movimiento
                if (search) {
                    const matchNombre = p.nombre.toLowerCase().includes(search);
                    const matchMov = p.movimientos.some(m => m.toLowerCase().includes(search));
                    const matchId = p.id.toString() === search;
                    if (!matchNombre && !matchMov && !matchId) return false;
                }

                // Filtro BST
                if (p.bst < minBST) return false;

                // Filtro tipos
                const hasActiveType = p.tipos.some(t => activeTypes.includes(t));
                if (!hasActiveType) return false;

                return true;
            });
        }

        function render() {
            const filtered = getFilteredData();
            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, totalItems);
            const pageItems = filtered.slice(start, end);

            // Contador
            totalCount.textContent = pokemonData.length;
            resultsInfo.textContent = `Mostrando ${totalItems > 0 ? start + 1 : 0}-${end} de ${totalItems} Pokémon`;

            // Grid
            if (pageItems.length === 0) {
                grid.innerHTML = `<div class="no-results"><span>🔍</span>No se encontraron Pokémon</div>`;
            } else {
                grid.innerHTML = pageItems.map(p => `
                    <div class="pokemon-card" data-id="${p.id}" onclick="openModal(${p.id})">
                        <span class="id">#${String(p.id).padStart(3, '0')}</span>
                        <div class="nombre">${p.nombre}</div>
                        <div class="types">
                            ${p.tipos.map(t => `<span class="type-badge ${getTypeClass(t)}">${t}</span>`).join('')}
                        </div>
                        <div class="bst">BST: ${p.bst}</div>
                        <div class="bst-bar"><div class="fill" style="width:${Math.min((p.bst/780)*100, 100)}%"></div></div>
                    </div>
                `).join('');
            }

            // Paginación
            renderPagination(totalPages, totalItems);
        }

        function renderPagination(totalPages, totalItems) {
            if (totalItems === 0) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>◀</button>`;

            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

            if (startPage > 1) {
                html += `<button onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<button disabled>...</button>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<button disabled>...</button>`;
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>▶</button>`;
            html += `<span class="info">Pág. ${currentPage} de ${totalPages}</span>`;

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================================
        //  🎯  MODAL - DETALLE DEL POKEMON
        // ============================================================

        function openModal(id) {
            const p = pokemonData.find(p => p.id === id);
            if (!p) return;

            const statsTotal = Object.values(p.stats).reduce((a, b) => a + b, 0);

            modalBody.innerHTML = `
                <div class="id">#${String(p.id).padStart(3, '0')}</div>
                <div class="nombre">${p.nombre}</div>
                <div class="types">
                    ${p.tipos.map(t => `<span class="type-badge ${getTypeClass(t)}">${t.toUpperCase()}</span>`).join('')}
                </div>

                <div class="bst-total">BST Total: ${p.bst} (Stats: ${statsTotal})</div>

                <div class="stats-grid">
                    ${Object.entries(p.stats).map(([k, v]) => `
                        <div class="stat-item">
                            <span class="label">${k.toUpperCase()}</span>
                            <span class="value">${v}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="section-title">⚡ Abilities</div>
                <div class="abilities">
                    ${p.habilidades.map(h => `<span class="ability-tag">${h}</span>`).join('')}
                    ${p.hOculta ? `<span class="ability-tag hidden">🔒 ${p.hOculta}</span>` : ''}
                </div>

                <div class="section-title">📈 Moves (Level)</div>
                <div class="moves-list">
                    ${p.movimientos.map(m => `<span class="move-tag">${m}</span>`).join('')}
                </div>

                ${p.evolucion ? `
                    <div class="section-title">🔄 Evolution</div>
                    <div class="evolution">${p.evolucion}</div>
                ` : ''}

                <div class="section-title">📖 Pokedex</div>
                <div class="pokedex-entry">${p.pokedex}</div>
            `;

            modal.classList.add('active');
        }

        // Exponer funciones globales
        window.openModal = openModal;
        window.goToPage = goToPage;

        // Render inicial
        render();
    </script>
