<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Visual - Banerica Region</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #f5c842;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 3em;
            color: #f5c842;
            text-shadow: 3px 3px 0 #c92a2a;
            letter-spacing: 3px;
        }
        .header p { color: #aaa; font-size: 1.1em; margin-top: 5px; }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #f5c842;
            font-size: 1.2em;
        }
        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #2c3e50;
            border-top-color: #f5c842;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .search-section {
            background: #0f3460;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .search-box { flex: 1; min-width: 200px; position: relative; }
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: none;
            background: #1a1a3e;
            color: white;
            font-size: 1em;
        }
        .search-box input::placeholder { color: #888; }
        .search-box .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }
        .filter-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a2a5e;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: 0.2s;
        }
        .filter-group label:hover { background: #2a4a7e; transform: scale(1.05); }
        .filter-group label input[type="checkbox"] { accent-color: #f5c842; }
        .bst-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2a5e;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .bst-filter input[type="range"] { width: 120px; accent-color: #f5c842; }
        .bst-filter span { font-weight: bold; color: #f5c842; min-width: 40px; }
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .pokemon-card {
            background: linear-gradient(145deg, #1a2a5e, #0f1a3e);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: #f5c842;
            box-shadow: 0 10px 30px rgba(245, 200, 66, 0.2);
        }
        .pokemon-card .id {
            font-size: 0.8em;
            color: #888;
            position: absolute;
            top: 10px;
            left: 12px;
            font-weight: bold;
        }
        .pokemon-card .nombre {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0 5px;
            color: #fff;
        }
        .pokemon-card .types {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .type-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .type-badge.grass { background: #27ae60; color: white; }
        .type-badge.fire { background: #e67e22; color: white; }
        .type-badge.water { background: #2980b9; color: white; }
        .type-badge.electric { background: #f1c40f; color: #222; }
        .type-badge.psychic { background: #8e44ad; color: white; }
        .type-badge.ice { background: #5dade2; color: #222; }
        .type-badge.dragon { background: #1a5276; color: white; }
        .type-badge.dark { background: #2c3e50; color: white; }
        .type-badge.fairy { background: #e84393; color: white; }
        .type-badge.fighting { background: #c0392b; color: white; }
        .type-badge.flying { background: #85c1e9; color: #222; }
        .type-badge.poison { background: #6c3483; color: white; }
        .type-badge.ground { background: #a67c52; color: white; }
        .type-badge.rock { background: #7f8c8d; color: white; }
        .type-badge.bug { background: #2ecc71; color: #222; }
        .type-badge.ghost { background: #4a235a; color: white; }
        .type-badge.steel { background: #7f8c8d; color: white; }
        .type-badge.normal { background: #95a5a6; color: #222; }
        .pokemon-card .bst {
            font-size: 0.9em;
            color: #f5c842;
            margin: 5px 0;
        }
        .bst-bar {
            height: 4px;
            background: #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 20px;
        }
        .bst-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #f5c842, #f39c12);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .pagination button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
        }
        .pagination button:hover { background: #1a4f8a; transform: scale(1.05); }
        .pagination button.active {
            background: #f5c842;
            color: #1a1a2e;
            font-weight: bold;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .pagination .info {
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #aaa;
            font-size: 0.9em;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(145deg, #1a2a5e, #0f1a3e);
            border-radius: 20px;
            max-width: 750px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            border: 2px solid #f5c842;
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: #c92a2a;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }
        .modal-close:hover { transform: scale(1.1); background: #e74c3c; }
        .modal .nombre {
            font-size: 2em;
            font-weight: bold;
            color: #f5c842;
            margin: 10px 0 5px;
            text-align: center;
        }
        .modal .id {
            color: #888;
            font-size: 1em;
            text-align: center;
            display: block;
        }
        .modal .types {
            display: flex;
            gap: 8px;
            margin: 10px 0 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .modal .category-text {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin: -5px 0 10px;
        }
        .modal .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 20px;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
        }
        .modal .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .modal .stat-item .label { color: #aaa; }
        .modal .stat-item .value { font-weight: bold; color: #f5c842; }
        .modal .bst-total {
            text-align: center;
            font-size: 1.3em;
            color: #f5c842;
            margin: 10px 0;
            padding: 10px;
            background: rgba(245, 200, 66, 0.1);
            border-radius: 10px;
        }
        .modal .section-title {
            color: #f5c842;
            font-size: 1.1em;
            margin: 15px 0 8px;
            border-bottom: 1px solid rgba(245, 200, 66, 0.2);
            padding-bottom: 5px;
        }
        .modal .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .modal .move-tag {
            background: #2c3e50;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #ddd;
        }
        .modal .move-tag.tutor {
            background: #1a4f8a;
            border: 1px solid #2980b9;
        }
        .modal .move-tag.egg {
            background: #6c3483;
            border: 1px solid #8e44ad;
        }
        .modal .move-tag.level {
            background: #1a5e3a;
            border: 1px solid #27ae60;
        }
        .modal .abilities {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .modal .ability-tag {
            background: #1a4f8a;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #fff;
        }
        .modal .ability-tag.hidden { background: #6c3483; }
        .modal .pokedex-entry {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-style: italic;
            color: #ccc;
            line-height: 1.5;
        }
        .modal .evolution {
            margin: 10px 0;
            padding: 10px;
            background: rgba(245, 200, 66, 0.1);
            border-radius: 10px;
            text-align: center;
        }
        .modal .extra-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 6px 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 15px;
            border-radius: 10px;
            margin: 8px 0;
        }
        .modal .extra-grid .item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }
        .modal .extra-grid .label { color: #aaa; font-size: 0.85em; }
        .modal .extra-grid .value { color: #f5c842; font-weight: bold; font-size: 0.9em; }
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .search-section { flex-direction: column; }
            .search-box { width: 100%; }
            .pokemon-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .modal-content { padding: 20px; margin: 10px; }
            .modal .stats-grid { grid-template-columns: 1fr; }
            .filter-group { justify-content: center; }
            .modal .extra-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .pokemon-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .pokemon-card .nombre { font-size: 1em; }
            .modal .extra-grid { grid-template-columns: 1fr; }
        }
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: #0f1a3e; border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb { background: #f5c842; border-radius: 10px; }
        .results-info {
            text-align: center;
            color: #aaa;
            margin: 10px 0 20px;
            font-size: 0.95em;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.2em;
            grid-column: 1 / -1;
        }
        .no-results span {
            font-size: 3em;
            display: block;
            margin-bottom: 15px;
        }
        .error-box {
            background: rgba(200, 50, 50, 0.2);
            border: 1px solid #c92a2a;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
        }
        .error-box .icon { font-size: 3em; display: block; margin-bottom: 15px; }
        .error-box .title { font-size: 1.3em; color: #f5c842; margin-bottom: 10px; }
        .error-box .detail { color: #aaa; font-size: 0.9em; }
        .warning-box {
            background: rgba(200, 150, 50, 0.2);
            border: 1px solid #f5c842;
            border-radius: 8px;
            padding: 10px 20px;
            margin: 10px 0;
            text-align: center;
            color: #f5c842;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> POTASSIUM DEX</h1>
            <p>Banerica Region • <span id="totalCount">0</span> Pokémon</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name, number or move...">
            </div>
            <div class="filters">
                <div class="filter-group" id="typeFilters"></div>
                <div class="bst-filter">
                    <span>BST ≥</span>
                    <input type="range" id="bstSlider" min="0" max="800" value="0">
                    <span id="bstValue">0</span>
                </div>
            </div>
        </div>

        <div class="results-info" id="resultsInfo">Loading data...</div>
        <div class="pokemon-grid" id="pokemonGrid">
            <div class="no-results">
                <span>⏳</span>
                Loading Pokédex...
                <div style="margin-top:15px;font-size:0.8em;color:#666;">
                    Reading pokemon.txt and dexorder.txt...
                </div>
            </div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  📁  FILE LOADING
        // ============================================================

        let pokemonData = [];
        let dexOrder = [];
        let currentPage = 1;
        const itemsPerPage = 24;

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const bstSlider = document.getElementById('bstSlider');
        const bstValue = document.getElementById('bstValue');
        const grid = document.getElementById('pokemonGrid');
        const pagination = document.getElementById('pagination');
        const resultsInfo = document.getElementById('resultsInfo');
        const totalCount = document.getElementById('totalCount');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        // ============================================================
        //  🧬  POKEMON.TXT PARSER
        // ============================================================

        function parsePokemonFile(text) {
            const blocks = text.split('#-------------------------------').filter(b => b.trim());
            const pokemons = {};

            blocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l);
                const pokemon = {};

                lines.forEach(line => {
                    const [key, ...valueParts] = line.split('=');
                    if (key && valueParts.length > 0) {
                        const cleanKey = key.trim();
                        const cleanValue = valueParts.join('=').trim();

                        switch (cleanKey) {
                            case 'Name':
                                pokemon.nombre = cleanValue;
                                pokemon.imagen = `images/${cleanValue.toUpperCase()}.png`;
                                break;
                            case 'Types':
                                pokemon.tipos = cleanValue.split(',').map(t => t.trim().toLowerCase());
                                break;
                            case 'BaseStats':
                                const stats = cleanValue.split(',').map(Number);
                                // Order: HP, Attack, Defense, Speed, Sp.Atk, Sp.Def
                                // HTML order: HP, Attack, Defense, Sp.Atk, Sp.Def, Speed
                                pokemon.stats = {
                                    hp: stats[0] || 0,
                                    atk: stats[1] || 0,
                                    def: stats[2] || 0,
                                    spa: stats[4] || 0,
                                    spd: stats[5] || 0,
                                    spe: stats[3] || 0
                                };
                                pokemon.bst = stats.reduce((a, b) => a + b, 0);
                                break;
                            case 'GenderRatio':
                                pokemon.genderRatio = cleanValue;
                                break;
                            case 'GrowthRate':
                                pokemon.growthRate = cleanValue;
                                break;
                            case 'BaseExp':
                                pokemon.baseExp = parseInt(cleanValue) || 0;
                                break;
                            case 'EVs':
                                pokemon.evs = cleanValue;
                                break;
                            case 'CatchRate':
                                pokemon.catchRate = parseInt(cleanValue) || 0;
                                break;
                            case 'Happiness':
                                pokemon.happiness = parseInt(cleanValue) || 0;
                                break;
                            case 'Abilities':
                                pokemon.habilidades = cleanValue.split(',').map(a => a.trim());
                                break;
                            case 'HiddenAbilities':
                                pokemon.hOculta = cleanValue;
                                break;
                            case 'Moves':
                                const moves = [];
                                const parts = cleanValue.split(',');
                                for (let i = 0; i < parts.length; i += 2) {
                                    if (i + 1 < parts.length) {
                                        const level = parseInt(parts[i]) || 0;
                                        const move = parts[i + 1].trim();
                                        moves.push({ level, move });
                                    }
                                }
                                pokemon.movesByLevel = moves;
                                pokemon.movimientos = moves.map(m => m.move);
                                break;
                            case 'TutorMoves':
                                pokemon.tutorMoves = cleanValue.split(',').map(m => m.trim());
                                break;
                            case 'EggMoves':
                                pokemon.eggMoves = cleanValue.split(',').map(m => m.trim());
                                break;
                            case 'EggGroups':
                                pokemon.eggGroups = cleanValue.split(',').map(g => g.trim());
                                break;
                            case 'HatchSteps':
                                pokemon.hatchSteps = parseInt(cleanValue) || 0;
                                break;
                            case 'Height':
                                pokemon.height = parseFloat(cleanValue) || 0;
                                break;
                            case 'Weight':
                                pokemon.weight = parseFloat(cleanValue) || 0;
                                break;
                            case 'Color':
                                pokemon.color = cleanValue;
                                break;
                            case 'Shape':
                                pokemon.shape = cleanValue;
                                break;
                            case 'Habitat':
                                pokemon.habitat = cleanValue;
                                break;
                            case 'Category':
                                pokemon.category = cleanValue;
                                break;
                            case 'Pokedex':
                                pokemon.pokedex = cleanValue;
                                break;
                            case 'Evolutions':
                                pokemon.evolucion = cleanValue;
                                pokemon.evolucionData = parseEvolution(cleanValue);
                                break;
                            case 'WildItemCommon':
                                pokemon.wildItemCommon = cleanValue;
                                break;
                            case 'WildItemUncommon':
                                pokemon.wildItemUncommon = cleanValue;
                                break;
                            case 'WildItemRare':
                                pokemon.wildItemRare = cleanValue;
                                break;
                        }
                    }
                });

                if (pokemon.nombre && pokemon.stats) {
                    // Default values
                    if (!pokemon.movimientos) pokemon.movimientos = [];
                    if (!pokemon.movesByLevel) pokemon.movesByLevel = [];
                    if (!pokemon.habilidades) pokemon.habilidades = [];
                    if (!pokemon.tutorMoves) pokemon.tutorMoves = [];
                    if (!pokemon.eggMoves) pokemon.eggMoves = [];
                    if (!pokemon.pokedex) pokemon.pokedex = 'No description available.';
                    if (!pokemon.evolucion) pokemon.evolucion = '---';
                    if (!pokemon.eggGroups) pokemon.eggGroups = [];
                    if (!pokemon.height) pokemon.height = 0;
                    if (!pokemon.weight) pokemon.weight = 0;
                    
                    pokemons[pokemon.nombre.toLowerCase()] = pokemon;
                }
            });

            return pokemons;
        }

        // ============================================================
        //  📋  DEXORDER.TXT PARSER
        // ============================================================

        function parseDexOrder(text) {
            return text.split('\n')
                .map(l => l.trim())
                .filter(l => l && !l.startsWith('#'));
        }
        // ============================================================
        //  🧬  EVOLUTION PARSER
        // ============================================================
        
function parseEvolution(evolutionText) {
    if (!evolutionText || evolutionText === '---') return [];
    
    const parts = evolutionText.split(',').map(s => s.trim());
    const evolutions = [];
    let currentEvo = null;
    let buffer = [];
    
    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        
        // Si la parte está completamente en mayúsculas Y tiene al menos una letra → es un Pokémon
        // (los números como "15" NO se consideran Pokémon)
        const isPokemonName = part === part.toUpperCase() && 
                              part.length > 0 && 
                              /[A-Z]/.test(part) && // tiene al menos una letra
                              !/^[0-9]+$/.test(part); // no es solo números
        
        if (isPokemonName) {
            // Guardar la evolución anterior
            if (currentEvo) {
                if (buffer.length > 0) {
                    currentEvo.condition = buffer.join(', ');
                    buffer = [];
                }
                evolutions.push(currentEvo);
            }
            // Iniciar nueva evolución
            currentEvo = {
                target: part,
                method: null,
                condition: null
            };
        } else {
            // Si no hay evolución actual, la creamos (por si el formato es raro)
            if (!currentEvo) {
                currentEvo = {
                    target: null,
                    method: null,
                    condition: null
                };
            }
            
            // Acumular método y condición
            if (!currentEvo.method) {
                currentEvo.method = part;
            } else {
                buffer.push(part);
            }
        }
    }
    
    // Guardar la última evolución
    if (currentEvo) {
        if (buffer.length > 0) {
            currentEvo.condition = buffer.join(', ');
        }
        // Si no tiene target, asignar un valor por defecto
        if (!currentEvo.target) {
            currentEvo.target = '???';
        }
        evolutions.push(currentEvo);
    }
    
    return evolutions;
}
        // ============================================================
        //  🏗️  BUILD POKEDEX

        function buildPokedex(pokemonMap, dexList) {
    const result = [];
    const missing = [];

    dexList.forEach((name, index) => {
        const key = name.toLowerCase();
        const pokemon = pokemonMap[key];
        
        if (pokemon) {
            // ✅ Encontrado: usar sus datos
            const clone = { ...pokemon };
            clone.id = index + 1;
            clone.nombre = name;
            result.push(clone);
        } else {
            // ❌ NO encontrado: crear Pokémon fantasma con ERROR
            missing.push(name);
            const ghostPokemon = {
                id: index + 1,
                nombre: name,
                tipos: ["unknown"],
                stats: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                bst: 0,
                habilidades: ["ERROR: Missing data"],
                hOculta: null,
                movimientos: [],
                movesByLevel: [],
                tutorMoves: [],
                eggMoves: [],
                pokedex: `⚠️ ERROR: "${name}" no encontrado en pokemon.txt. Verifica que el nombre coincida exactamente.`,
                evolucion: "---",
                isMissing: true,  // 🔴 MARCADO COMO ERROR
                height: 0,
                weight: 0,
                catchRate: 0,
                happiness: 0,
                baseExp: 0,
                genderRatio: null,
                growthRate: null,
                eggGroups: [],
                category: "❌ DATOS FALTANTES",
                evs: {}
            };
            result.push(ghostPokemon);
        }
    });

    // Añadir Pokémon que están en pokemon.txt pero no en dexorder.txt
    const dexNames = new Set(dexList.map(n => n.toLowerCase()));
    Object.keys(pokemonMap).forEach(key => {
        if (!dexNames.has(key)) {
            const pokemon = { ...pokemonMap[key] };
            pokemon.id = result.length + 1;
            result.push(pokemon);
        }
    });

    pokemonData = result;

    // Mostrar advertencia si hay Pokémon faltantes
    if (missing.length > 0) {
        console.error('❌ Pokémon en dexorder.txt pero NO en pokemon.txt:', missing);
        
        // Eliminar advertencias anteriores
        document.querySelectorAll('.warning-box').forEach(el => el.remove());
        
        const warning = document.createElement('div');
        warning.className = 'warning-box';
        warning.style.cssText = `
            background: rgba(200, 50, 50, 0.25);
            border: 2px solid #c92a2a;
            border-radius: 10px;
            padding: 15px 20px;
            margin: 15px 0;
            text-align: center;
            color: #ff6b6b;
        `;
        warning.innerHTML = `
            <strong> ${missing.length} Pokemon not yet added</strong><br>
            <span style="color:#ff8787;font-size:0.9em;display:block;margin:8px 0;">
                ${missing.map(n => `"${n}"`).join(', ')}
            </span>
            <small style="color:#ffa8a8;font-size:0.85em;">
                These pokemons may come in the future, names might change.<br>
            </small>
        `;
        const container = document.querySelector('.container');
        const searchSection = document.querySelector('.search-section');
        container.insertBefore(warning, searchSection);
    }

    if (pokemonData.length === 0) {
        grid.innerHTML = `
            <div class="no-results" style="grid-column:1/-1;">
                <span>❌</span>
                No Pokémon found<br>
                <small style="font-size:0.7em;color:#666;">
                    Check that pokemon.txt has the correct format.
                </small>
            </div>
        `;
        resultsInfo.textContent = '0 Pokémon found';
        return;
    }

    initApp();
}

        // ============================================================
        //  🎨  RENDER
        // ============================================================

        function getTypeClass(type) {
            const map = {
                'grass': 'grass', 'fire': 'fire', 'water': 'water',
                'electric': 'electric', 'psychic': 'psychic', 'ice': 'ice',
                'dragon': 'dragon', 'dark': 'dark', 'fairy': 'fairy',
                'fighting': 'fighting', 'flying': 'flying', 'poison': 'poison',
                'ground': 'ground', 'rock': 'rock', 'bug': 'bug',
                'ghost': 'ghost', 'steel': 'steel', 'normal': 'normal'
            };
            return map[type] || 'normal';
        }

        function initApp() {
            // Generate type filters
            const allTypes = [...new Set(pokemonData.flatMap(p => p.tipos))].sort();
            const typeFiltersDiv = document.getElementById('typeFilters');
            typeFiltersDiv.innerHTML = '';
            allTypes.forEach(type => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = type;
                cb.checked = true;
                cb.className = 'type-checkbox';
                label.appendChild(cb);
                label.appendChild(document.createTextNode(type.charAt(0).toUpperCase() + type.slice(1)));
                typeFiltersDiv.appendChild(label);
            });

            // Events
            bstSlider.addEventListener('input', () => {
                bstValue.textContent = bstSlider.value;
                currentPage = 1;
                render();
            });

            searchInput.addEventListener('input', () => { currentPage = 1; render(); });
            document.querySelectorAll('.type-checkbox').forEach(cb => cb.addEventListener('change', () => { currentPage = 1; render(); }));

            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') modal.classList.remove('active');
            });

            totalCount.textContent = pokemonData.length;
            render();
        }

        function getFilteredData() {
            const search = searchInput.value.toLowerCase().trim();
            const minBST = parseInt(bstSlider.value) || 0;
            const activeTypes = [...document.querySelectorAll('.type-checkbox:checked')].map(cb => cb.value);

            return pokemonData.filter(p => {
                if (search) {
                    const matchNombre = p.nombre.toLowerCase().includes(search);
                    const matchMov = p.movimientos.some(m => m.toLowerCase().includes(search));
                    const matchId = p.id.toString() === search;
                    if (!matchNombre && !matchMov && !matchId) return false;
                }
                if (p.bst < minBST) return false;
                const hasActiveType = p.tipos.some(t => activeTypes.includes(t));
                if (!hasActiveType) return false;
                return true;
            });
        }

        function render() {
            const filtered = getFilteredData();
            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, totalItems);
            const pageItems = filtered.slice(start, end);

            totalCount.textContent = pokemonData.length;
            resultsInfo.textContent = `Showing ${totalItems > 0 ? start + 1 : 0}-${end} of ${totalItems} Pokémon`;

            if (pageItems.length === 0) {
                grid.innerHTML = `<div class="no-results" style="grid-column:1/-1;"><span>🔍</span>No Pokémon found</div>`;
            } else {
                grid.innerHTML = pageItems.map(p => {
    // Si el Pokémon tiene datos faltantes, mostrar tarjeta roja
    if (p.isMissing) {
        return `
            <div class="pokemon-card" style="border-color:#c92a2a;background:linear-gradient(145deg,#2a0a0a,#1a0505);" onclick="openModal(${p.id})">
                <span class="id">#${String(p.id).padStart(3, '0')}</span>
                <div class="nombre" style="color:#ff6b6b;">❌ ${p.nombre}</div>
                <div class="types">
                    <span class="type-badge" style="background:#c92a2a;color:white;">⚠️ ERROR</span>
                </div>
                <div class="bst" style="color:#ff6b6b;">Missing Info</div>
                <div style="font-size:0.7em;color:#666;margin-top:5px;">Might come in the future</div>
            </div>
        `;
    }
    // Tarjeta normal para Pokémon con datos
    return `
        <div class="pokemon-card" onclick="openModal(${p.id})">
            <span class="id">#${String(p.id).padStart(3, '0')}</span>
            <img src="${p.imagen || 'images/000.png'}" 
                alt="${p.nombre}" 
                style="width:80px;height:80px;display:block;margin:0 auto;border-radius:50%;background:#1a2a5e;padding:5px;object-fit:contain;"
                onerror="this.src='images/000.png';">
            <div class="nombre">${p.nombre}</div>
            <div class="types">
                ${p.tipos.map(t => `<span class="type-badge ${getTypeClass(t)}">${t}</span>`).join('')}
            </div>
            <div class="bst">BST: ${p.bst}</div>
            <div class="bst-bar"><div class="fill" style="width:${Math.min((p.bst/780)*100, 100)}%"></div></div>
        </div>
`;
}).join('');
            }

            renderPagination(totalPages, totalItems);
        }

        function renderPagination(totalPages, totalItems) {
            if (totalItems === 0) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>◀</button>`;

            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

            if (startPage > 1) {
                html += `<button onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<button disabled>...</button>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<button disabled>...</button>`;
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>▶</button>`;
            html += `<span class="info">Page ${currentPage} of ${totalPages}</span>`;

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
